name: ci

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  lint-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install

      - name: Lint
        run: deno task lint

      - name: Format check
        run: deno fmt --check
