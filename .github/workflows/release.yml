name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        run: echo "version=$(date -u +'%Y.%-m.%d%H%M%S')" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: ubuntu-22.04-arm
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Rust
        if: matrix.rust-targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust with target
        if: matrix.rust-targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: deno install

      - name: Prepare release build
        shell: bash
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          deno eval '
            const endpoint = "https://github.com/LeoMartinDev/echo/releases/latest/download/latest.json";
            const publicKey = Deno.env.get("TAURI_UPDATER_PUBLIC_KEY");
            if (!publicKey) {
              throw new Error("Missing TAURI_UPDATER_PUBLIC_KEY secret");
            }

            const configPath = "src-tauri/tauri.conf.json";
            const packagePath = "package.json";
            const cargoPath = "src-tauri/Cargo.toml";

            const config = JSON.parse(await Deno.readTextFile(configPath));
            const version = Deno.env.get("RELEASE_VERSION");
            if (!version) {
              throw new Error("Missing RELEASE_VERSION");
            }

            config.version = version;
            config.bundle = { ...config.bundle, createUpdaterArtifacts: true };
            config.plugins = {
              ...config.plugins,
              updater: {
                pubkey: publicKey,
                endpoints: [endpoint],
                windows: { installMode: "passive" },
              },
            };
            await Deno.writeTextFile(configPath, `${JSON.stringify(config, null, 2)}\n`);

            const pkg = JSON.parse(await Deno.readTextFile(packagePath));
            pkg.version = version;
            await Deno.writeTextFile(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);

            const cargo = await Deno.readTextFile(cargoPath);
            await Deno.writeTextFile(
              cargoPath,
              cargo.replace(/^version = ".*"$/m, `version = "${version}"`),
            );
          '

      # Tauri v2 docs currently reference the v0 action line; pin the latest
      # published v0 tag because the repository does not expose a v1 tag.
      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: deno task tauri
          tagName: echo-v__VERSION__
          releaseName: Echo v__VERSION__
          releaseBody: Build automatique depuis `${{ github.sha }}`.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          args: ${{ matrix.args }}
