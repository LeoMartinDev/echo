name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      date_label: ${{ steps.version.outputs.date_label }}
    steps:
      - id: version
        shell: bash
        run: |
          IFS='|' read -r year doy hour minute second date_label < <(date -u +'%Y|%j|%H|%M|%S|%Y-%m-%dT%H:%M:%SZ')
          doy=$((10#$doy))
          hour=$((10#$hour))
          minute=$((10#$minute))
          second=$((10#$second))

          if (( doy > 183 )); then
            half=1
            day_in_half=$((doy - 183))
          else
            half=0
            day_in_half=$doy
          fi

          major=$(((year - 2000) * 2 + half))
          patch=$(((hour * 3600 + minute * 60 + second) / 2))

          echo "version=$major.$day_in_half.$patch" >> "$GITHUB_OUTPUT"
          echo "date_label=$date_label" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - platform: ubuntu-24.04
            args: ""
            rust-targets: ""
          - platform: ubuntu-24.04-arm
            args: ""
            rust-targets: ""
          - platform: windows-2025
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate release secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret"
            exit 1
          fi

          if [ -z "$TAURI_UPDATER_PUBLIC_KEY" ]; then
            echo "::error::Missing TAURI_UPDATER_PUBLIC_KEY secret"
            exit 1
          fi

          if [[ "$TAURI_SIGNING_PRIVATE_KEY" == *%* ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY contains '%' characters. It looks URL-encoded; paste the raw private key content generated by 'tauri signer generate' instead."
            exit 1
          fi

      - name: Configure macOS native build
        if: startsWith(matrix.platform, 'macos-')
        run: |
          echo "CARGO_BUILD_JOBS=1" >> "$GITHUB_ENV"
          echo "CMAKE_BUILD_PARALLEL_LEVEL=1" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> "$GITHUB_ENV"
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=10.15" >> "$GITHUB_ENV"
          echo "WHISPER_DONT_GENERATE_BINDINGS=1" >> "$GITHUB_ENV"
          xcodebuild -version
          xcrun -sdk macosx --show-sdk-version

      - name: Configure Windows native build
        if: startsWith(matrix.platform, 'windows-')
        shell: pwsh
        run: |
          $llvmBin = "${env:ProgramFiles}\LLVM\bin"
          if (-not (Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            choco install llvm -y --no-progress
          }
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          echo "WHISPER_DONT_GENERATE_BINDINGS=1" >> "$GITHUB_ENV"
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            libasound2-dev \
            libxdo-dev

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Rust
        if: matrix.rust-targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust with target
        if: matrix.rust-targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: deno install

      - name: Prepare release build
        shell: bash
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          deno eval '
            const endpoint = "https://github.com/LeoMartinDev/echo/releases/latest/download/latest.json";
            const publicKey = Deno.env.get("TAURI_UPDATER_PUBLIC_KEY");
            if (!publicKey) {
              throw new Error("Missing TAURI_UPDATER_PUBLIC_KEY secret");
            }

            const configPath = "src-tauri/tauri.conf.json";
            const packagePath = "package.json";
            const cargoPath = "src-tauri/Cargo.toml";

            const config = JSON.parse(await Deno.readTextFile(configPath));
            const version = Deno.env.get("RELEASE_VERSION");
            if (!version) {
              throw new Error("Missing RELEASE_VERSION");
            }

            config.version = version;
            config.bundle = { ...config.bundle, createUpdaterArtifacts: true };
            config.plugins = {
              ...config.plugins,
              updater: {
                pubkey: publicKey,
                endpoints: [endpoint],
                windows: { installMode: "passive" },
              },
            };
            await Deno.writeTextFile(configPath, `${JSON.stringify(config, null, 2)}\n`);

            const pkg = JSON.parse(await Deno.readTextFile(packagePath));
            pkg.version = version;
            await Deno.writeTextFile(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);

            const cargo = await Deno.readTextFile(cargoPath);
            await Deno.writeTextFile(
              cargoPath,
              cargo.replace(/^version = ".*"$/m, `version = "${version}"`),
            );
          '

      # Tauri v2 docs currently reference the v0 action line; pin the latest
      # published v0 tag because the repository does not expose a v1 tag.
      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: deno task tauri
          tagName: echo-v__VERSION__
          releaseName: Echo v__VERSION__ (${{ needs.prepare.outputs.date_label }})
          releaseBody: Automated build from `${{ github.sha }}` at `${{ needs.prepare.outputs.date_label }}`.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
